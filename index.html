<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Lorvien Parfums</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<header class="header">

    <a href="index.html" class="logo">
        LORVIEN
        <span>PARFUMS</span>
    </a>

    <button class="menu-btn" id="menuBtn">
        ☰
    </button>

</header>

<nav class="menu" id="menu">

    <a href="index.html">Home</a>
    <a href="#collection">Collection</a>
    <a href="#about">About</a>
    <a href="cart.html">Cart</a>

</nav>

<section class="hero">

    <div class="hero-content">

        <p class="hero-subtitle">
            Luxury Fragrance
        </p>

        <h1>
            Crafted For<br>
            Everyday Confidence
        </h1>

        <p class="hero-description">
            Premium-inspired fragrances designed for everyday luxury.
        </p>

        <a href="#collection" class="hero-btn">
            Explore Collection
        </a>

    </div>

    <div class="hero-image">

        <img src="assets/images/perfume1.png"
             alt="Lorvien Perfume">

    </div>

</section>

<section id="collection" class="collection">
  <h2 class="section-title">Our Collection</h2>

<div class="product-slider">

    <div class="product-track">

        <!-- Noir -->
        <div class="product-card">

            <img src="assets/images/noir.png" alt="Noir Essence">

            <h3>Noir Essence</h3>

            <p class="price">₹499</p>

            <a href="product.html?product=noir" class="product-btn">
                View Details
            </a>

        </div>

        <!-- Oud -->
        <div class="product-card">

            <img src="assets/images/oud.png" alt="Royal Oud">

            <h3>Royal Oud</h3>

            <p class="price">₹499</p>

            <a href="product.html?product=oud" class="product-btn">
                View Details
            </a>

        </div>

        <!-- Velvet -->
        <div class="product-card">

            <img src="assets/images/velvet.png" alt="Velvet Bloom">

            <h3>Velvet Bloom</h3>

            <p class="price">₹499</p>

            <a href="product.html?product=velvet" class="product-btn">
                View Details
            </a>

        </div>

    </div>

</div>

</section>
