<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Cart - Lorvien Parfums</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    background:#0d0d0d;
    color:#fff;
    font-family:Arial,sans-serif;
    margin:0;
}

.container{
    max-width:500px;
    margin:auto;
    padding:20px;
}

.cart-box{
    background:#1b1b1b;
    padding:20px;
    border-radius:12px;
}

h1{
    text-align:center;
}

.row{
    display:flex;
    justify-content:space-between;
    margin:15px 0;
}

.price{
    color:#d4af37;
    font-size:24px;
    font-weight:bold;
}

.btn{
    display:block;
    width:100%;
    text-align:center;
    background:#d4af37;
    color:#000;
    padding:15px;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
    margin-top:25px;
}
    <script>
let quantity = 1;
let price = 499;

function updateTotal() {
    document.getElementById("qty").innerText = quantity;
    document.getElementById("total").innerText = "₹" + (quantity * price);
}

function plus() {
    quantity++;
    updateTotal();
}

function minus() {
    if (quantity > 1) {
        quantity--;
        updateTotal();
    }
}
</script>
</style>

</head>
<body>

<div class="container">

<h1>Your Cart</h1>

<div class="cart-box">

<div class="row">
<span>Noir Essence (50ML)</span>
<span>₹499</span>
</div>

<hr>

<div class="row">
<strong>Total</strong>
<strong class="price">₹499</strong>
</div>

<a href="checkout.html" class="btn">
Proceed to Checkout
</a>

</div>

</div>

</body>
</html>
